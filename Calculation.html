<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculation Tools - H/W Work</title>
    <!-- 공통 로직 파일 연결: ./assets/js/common.js 경로를 사용합니다. -->
    <script src="./assets/js/common.js" defer></script>
    <style>
        /* 계산기 전용 스타일 (공통 테마와 헤더는 common.js에서 주입됨) */
        .calc-wrapper { 
            padding: 30px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        
        /* 탭 메뉴 디자인 */
        .nav-tabs { 
            display: flex; 
            gap: 5px; 
            background: var(--card); 
            padding: 10px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            margin-bottom: 25px;
            overflow-x: auto;
        }
        .tab-btn {
            flex: 1; 
            padding: 12px; 
            border: none; 
            background: none; 
            color: var(--text);
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1rem; 
            transition: 0.2s;
            white-space: nowrap;
        }
        .tab-btn:hover { background: rgba(0, 216, 214, 0.1); }
        .tab-btn.active { background: var(--accent); color: #000; }

        /* 계산기 카드 */
        .calc-card {
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 16px;
            padding: 40px; 
            display: none; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }
        .calc-card.active { display: block; }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .calc-card h2 { 
            margin-top: 0; 
            color: var(--accent); 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 15px; 
            margin-bottom: 30px; 
        }

        /* 입력 그리드 레이아웃 */
        .input-grid { 
            display: grid; 
            grid-template-columns: 180px 1fr 70px; 
            gap: 15px; 
            align-items: center; 
            margin-bottom: 15px; 
        }
        .input-grid label { font-weight: bold; font-size: 1.1rem; }
        
        input {
            padding: 15px; 
            background: var(--input-bg); 
            border: 2px solid #007AFF; 
            color: #007AFF; 
            border-radius: 10px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            text-align: center; 
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        /* 결과창은 빨간색으로 강조 */
        input:read-only { 
            border-color: #FF3B30; 
            color: #FF3B30; 
            background: rgba(255,59,48,0.05); 
            cursor: default;
        }
        .unit { color: #888; font-weight: bold; font-size: 1rem; }

        hr { border: none; border-top: 1px solid var(--border); margin: 30px 0; }
    </style>
</head>
<body>
    <!-- 
      주의: 헤더, 세이버, 설정 모달은 common.js가 주입하므로 
      HTML 본문에는 계산 영역인 .calc-wrapper만 작성합니다.
    -->

    <div class="calc-wrapper">
        <!-- 탭 메뉴 (백업본의 5가지 핵심 기능 복원) -->
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="showCalc('adj', this)">Adjust FB</button>
            <button class="tab-btn" onclick="showCalc('para', this)">Parallel R</button>
            <button class="tab-btn" onclick="showCalc('dg', this)">Bias / DG</button>
            <button class="tab-btn" onclick="showCalc('avs', this)">AVS Logic</button>
            <button class="tab-btn" onclick="showCalc('xtal', this)">X-tal Cap</button>
        </div>

        <!-- 1. Adjust Feedback -->
        <div id="calc-adj" class="calc-card active">
            <h2>Adjust Feedback Resistor</h2>
            <div class="input-grid"><label>Target Vout</label><input type="number" id="adj_tv" value="1.8" step="0.1" oninput="calcAll()"><span class="unit">V</span></div>
            <div class="input-grid"><label>Reference Vref</label><input type="number" id="adj_vref" value="0.6" step="0.01" oninput="calcAll()"><span class="unit">V</span></div>
            <hr>
            <div class="input-grid"><label>R Top (R1)</label><input type="number" id="adj_rt" value="10" step="0.1" oninput="calcAll()"><span class="unit">kΩ</span></div>
            <div class="input-grid"><label>R Bot (R2) Result</label><input type="text" id="adj_rb" readonly><span class="unit">kΩ</span></div>
        </div>

        <!-- 2. Parallel Resistance -->
        <div id="calc-para" class="calc-card">
            <h2>Parallel Resistance</h2>
            <div class="input-grid"><label>Resistor 1</label><input type="number" id="pa_r1" value="10" oninput="calcAll()"><span class="unit">kΩ</span></div>
            <div class="input-grid"><label>Resistor 2</label><input type="number" id="pa_r2" value="10" oninput="calcAll()"><span class="unit">kΩ</span></div>
            <hr>
            <div class="input-grid"><label>Combined Result</label><input type="text" id="pa_res" readonly><span class="unit">kΩ</span></div>
        </div>

        <!-- 3. Bias / Dying Gasp -->
        <div id="calc-dg" class="calc-card">
            <h2>Bias & Dying Gasp (Energy)</h2>
            <div class="input-grid"><label>V-Start (V1)</label><input type="number" id="dg_v1" value="12" oninput="calcAll()"><span class="unit">V</span></div>
            <div class="input-grid"><label>V-Stop (V2)</label><input type="number" id="dg_v2" value="9" oninput="calcAll()"><span class="unit">V</span></div>
            <div class="input-grid"><label>Total Cap</label><input type="number" id="dg_cap" value="470" oninput="calcAll()"><span class="unit">uF</span></div>
            <hr>
            <div class="input-grid"><label>Stored Energy</label><input type="text" id="dg_res" readonly><span class="unit">mJ</span></div>
        </div>

        <!-- 4. AVS Logic -->
        <div id="calc-avs" class="calc-card">
            <h2>AVS (Adaptive Voltage Scaling)</h2>
            <div class="input-grid"><label>Base V-Ref</label><input type="number" id="av_vr" value="0.6" step="0.01" oninput="calcAll()"><span class="unit">V</span></div>
            <div class="input-grid"><label>V-DAC Input</label><input type="number" id="av_vd" value="0.5" step="0.01" oninput="calcAll()"><span class="unit">V</span></div>
            <hr>
            <div class="input-grid"><label>FB R-Top (R1)</label><input type="number" id="av_rt" value="100" oninput="calcAll()"><span class="unit">kΩ</span></div>
            <div class="input-grid"><label>AVS R-Div (R2)</label><input type="number" id="av_rd" value="47" oninput="calcAll()"><span class="unit">kΩ</span></div>
            <hr>
            <div class="input-grid"><label>Resulting Vout</label><input type="text" id="av_res" readonly><span class="unit">V</span></div>
        </div>

        <!-- 5. X-tal Load Cap -->
        <div id="calc-xtal" class="calc-card">
            <h2>X-tal Load Capacitance</h2>
            <div class="input-grid"><label>Target CL</label><input type="number" id="xt_tcl" value="12" oninput="calcAll()"><span class="unit">pF</span></div>
            <div class="input-grid"><label>Stray Cap (Cs)</label><input type="number" id="xt_cs" value="2" oninput="calcAll()"><span class="unit">pF</span></div>
            <div class="input-grid"><label>Req. C1, C2</label><input type="text" id="xt_rc" readonly><span class="unit">pF</span></div>
            <hr>
            <div class="input-grid"><label>Selected C1, C2</label><input type="number" id="xt_c1" value="20" oninput="calcAll()"><span class="unit">pF</span></div>
            <div class="input-grid"><label>Resulting CL</label><input type="text" id="xt_rcl" readonly><span class="unit">pF</span></div>
        </div>
    </div>

    <script>
        /**
         * common.js 로드 확인 및 초기화
         */
        document.addEventListener('DOMContentLoaded', () => {
            const startUI = () => {
                if (typeof window.initHeader === 'function') {
                    // common.js에 정의된 헤더/UI 초기화 함수 호출
                    window.initHeader('Calculation Tools');
                } else {
                    // 파일 로드 지연 시 0.1초 뒤 재시도
                    setTimeout(startUI, 100);
                }
            };
            startUI();
            calcAll(); // 초기 계산 수행
        });

        // 탭 전환 기능
        function showCalc(type, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.calc-card').forEach(c => c.classList.remove('active'));
            const target = document.getElementById('calc-' + type);
            if (target) target.classList.add('active');
        }

        /**
         * 백업본(Calculation-backup.html)에서 가져온 정밀 계산 로직
         */
        function calcAll() {
            // 1. Adjust Feedback: R2 = R1 / (Vout/Vref - 1)
            const adj_tv = parseFloat(document.getElementById('adj_tv').value) || 0;
            const adj_vr = parseFloat(document.getElementById('adj_vref').value) || 0;
            const adj_rt = parseFloat(document.getElementById('adj_rt').value) || 0;
            const adj_rb_el = document.getElementById('adj_rb');
            if (adj_tv > adj_vr && adj_vr > 0) {
                adj_rb_el.value = (adj_rt / (adj_tv / adj_vr - 1)).toFixed(3);
            } else {
                adj_rb_el.value = "Error";
            }

            // 2. Parallel Resistance: Req = (R1 * R2) / (R1 + R2)
            const pa_r1 = parseFloat(document.getElementById('pa_r1').value) || 0;
            const pa_r2 = parseFloat(document.getElementById('pa_r2').value) || 0;
            const pa_res_el = document.getElementById('pa_res');
            if (pa_r1 + pa_r2 > 0) {
                pa_res_el.value = ((pa_r1 * pa_r2) / (pa_r1 + pa_r2)).toFixed(3);
            } else {
                pa_res_el.value = "0.000";
            }

            // 3. Bias / Dying Gasp (Energy): E = 0.5 * C * (V1^2 - V2^2)
            const dg_v1 = parseFloat(document.getElementById('dg_v1').value) || 0;
            const dg_v2 = parseFloat(document.getElementById('dg_v2').value) || 0;
            const dg_cap = parseFloat(document.getElementById('dg_cap').value) || 0;
            const dg_res_el = document.getElementById('dg_res');
            dg_res_el.value = (0.5 * dg_cap * (dg_v1**2 - dg_v2**2) / 1000).toFixed(2);

            // 4. AVS Logic: Vout = Vref + (Rt/Rd)*(Vref - Vdac)
            const av_vr = parseFloat(document.getElementById('av_vr').value) || 0;
            const av_vd = parseFloat(document.getElementById('av_vd').value) || 0;
            const av_rt = parseFloat(document.getElementById('av_rt').value) || 0;
            const av_rd = parseFloat(document.getElementById('av_rd').value) || 1;
            const av_res_el = document.getElementById('av_res');
            av_res_el.value = (av_vr + (av_rt / av_rd) * (av_vr - av_vd)).toFixed(3);

            // 5. X-tal Load Cap: ReqC = (TargetCL - Cs) * 2 / ResultCL = C1/2 + Cs
            const xt_tcl = parseFloat(document.getElementById('xt_tcl').value) || 0;
            const xt_cs = parseFloat(document.getElementById('xt_cs').value) || 0;
            const xt_c1 = parseFloat(document.getElementById('xt_c1').value) || 0;
            const xt_rc_el = document.getElementById('xt_rc');
            const xt_rcl_el = document.getElementById('xt_rcl');
            xt_rc_el.value = ((xt_tcl - xt_cs) * 2).toFixed(2);
            xt_rcl_el.value = (xt_c1 / 2 + xt_cs).toFixed(2);
        }
    </script>
</body>
</html>
