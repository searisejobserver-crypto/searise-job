<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TimeLine - Dashboard Sync</title>
    <script src="./assets/js/common.js" defer></script>
    <style>
        /* --- 공통 테마 기본값 --- */
        :root { 
            --temp-red: #FF3B30; --humi-blue: #007AFF; --cycle-orange: #FF9500;
            --doing: #00FFCC; --bg: #1a1a1a; --card: #252525; --text: #eee; --axis: #ffffff;
            --input-bg: #111; --border: #444; --accent: #00d8d6;
        }
        
        [data-theme="light"] {
            --bg: #f5f6fa; --card: #ffffff; --text: #2f3640; --border: #b2bec3; 
            --axis: #2f3640; --input-bg: #fdfdfd; --accent: #0097e6;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        /* 컨트롤 패널 */
        .control-panel { 
            background: var(--card); padding: 20px; border-radius: 12px; 
            border: 1px solid var(--border); margin-bottom: 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;
        }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; color: var(--accent); font-weight: bold; }
        input, select { 
            background: var(--input-bg); border: 1px solid var(--border); 
            color: var(--text); padding: 10px; border-radius: 6px; outline: none;
        }
        
        .btn-row { display: flex; gap: 10px; margin-top: 10px; grid-column: 1 / -1; }
        button { 
            padding: 10px 20px; border-radius: 6px; cursor: pointer; border: none;
            font-weight: bold; transition: 0.2s; background: #444; color: #fff;
        }
        button:hover { opacity: 0.8; }
        .primary-btn { background: var(--accent); color: #000; }
        
        /* 캔버스 영역 */
        .canvas-container { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 12px; padding: 20px; overflow-x: auto; position: relative;
        }
        canvas { display: block; background: transparent; }

        .data-list { margin-top: 20px; width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .data-list th, .data-list td { border: 1px solid var(--border); padding: 10px; text-align: center; }
        .data-list th { background: rgba(255,255,255,0.05); color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <div class="control-panel">
            <div class="input-group">
                <label>시작 시간 (Start Time)</label>
                <input type="datetime-local" id="start-time">
            </div>
            <div class="input-group">
                <label>총 소요 시간 (분)</label>
                <input type="number" id="total-min" value="120">
            </div>
            <div class="input-group">
                <label>동작 구분</label>
                <select id="action-type">
                    <option value="TEMP">Temperature (High/Low)</option>
                    <option value="HUMI">Humidity</option>
                    <option value="CYCLE">Cycle Check</option>
                </select>
            </div>
            <div class="input-group">
                <label>상세 내용 (Value/Desc)</label>
                <input type="text" id="action-desc" placeholder="ex. 85도, 85%, 10회">
            </div>
            <div class="btn-row">
                <button class="primary-btn" onclick="addInterval()">기록 추가</button>
                <button id="run-btn" onclick="toggleRun()">Run Sequence</button>
                <button onclick="exportToRepo()">Save to Repo (JSON)</button>
                <button onclick="document.getElementById('import-file').click()">Import JSON</button>
                <input type="file" id="import-file" style="display:none" onchange="importData(event)">
                <button onclick="clearAll()" style="background:#ff3b30">초기화</button>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="timelineCanvas" width="1100" height="400"></canvas>
        </div>

        <table class="data-list">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Description</th>
                    <th>Start (+min)</th>
                    <th>End (+min)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="data-body"></tbody>
        </table>
    </div>

    <script>
        let intervals = [];
        let isRunning = false;
        const canvas = document.getElementById('timelineCanvas');
        const ctx = canvas.getContext('2d');

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window.initHeader === 'function') window.initHeader('TimeLine Manager');
            
            // 1. 페이지 로드 시 ./data/TimeLine/timeline_data.json 자동 로드 시도
            loadTimelineFromRepo();
        });

        async function loadTimelineFromRepo() {
            try {
                const response = await fetch('./data/TimeLine/timeline_data.json');
                if (response.ok) {
                    const data = await response.json();
                    intervals = data;
                    saveLocal();
                    updateCanvas();
                    console.log("GitHub 데이터가 자동으로 로드되었습니다.");
                } else {
                    loadLocal();
                }
            } catch (e) {
                console.log("저장소 데이터를 찾을 수 없어 로컬 데이터를 사용합니다.");
                loadLocal();
            }
        }

        function addInterval() {
            const type = document.getElementById('action-type').value;
            const desc = document.getElementById('action-desc').value;
            const total = parseInt(document.getElementById('total-min').value);
            
            // 샘플 데이터 구조
            intervals.push({
                type, desc, start: 0, end: total, timestamp: new Date().getTime()
            });
            
            saveLocal();
            updateCanvas();
        }

        function saveLocal() {
            localStorage.setItem('timeline_data', JSON.stringify(intervals));
            renderTable();
        }

        function loadLocal() {
            const saved = localStorage.getItem('timeline_data');
            if (saved) {
                intervals = JSON.parse(saved);
                updateCanvas();
            }
        }

        /**
         * [수정] 데이터 내보내기: ./data/TimeLine 폴더에 저장하기 용이하도록 파일명 고정
         */
        function exportToRepo() {
            if (intervals.length === 0) return alert("저장할 데이터가 없습니다.");
            
            const dataStr = JSON.stringify(intervals, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            // 파일명을 고정하여 ./data/TimeLine/ 폴더 관리를 편하게 함
            a.download = "timeline_data.json"; 
            a.click();
            
            alert("다운로드된 'timeline_data.json' 파일을 프로젝트의 ./data/TimeLine 폴더에 덮어쓰고 커밋하세요.");
        }

        /**
         * [수정] 데이터 불러오기: JSON 파일을 선택하면 즉시 화면과 LocalStorage에 적용
         */
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        intervals = imported;
                        saveLocal();    // 로컬 저장소 동기화
                        updateCanvas(); // 캔버스 즉시 갱신
                        alert("데이터가 즉시 적용되었습니다.");
                    } else {
                        throw new Error();
                    }
                } catch (err) {
                    alert("JSON 형식이 올바르지 않습니다.");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // 재선택 가능하도록 초기화
        }

        function clearAll() {
            if(confirm("모든 데이터를 삭제하시겠습니까?")) {
                intervals = [];
                saveLocal();
                updateCanvas();
            }
        }

        function renderTable() {
            const body = document.getElementById('data-body');
            body.innerHTML = intervals.map((item, idx) => `
                <tr>
                    <td>${item.type}</td>
                    <td>${item.desc}</td>
                    <td>${item.start} min</td>
                    <td>${item.end} min</td>
                    <td><button onclick="deleteItem(${idx})" style="background:#ff3b30; padding:5px 10px; font-size:11px;">삭제</button></td>
                </tr>
            `).join('');
        }

        function deleteItem(idx) {
            intervals.splice(idx, 1);
            saveLocal();
            updateCanvas();
        }

        function updateCanvas() {
            renderTable();
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0, 0, w, h);
            
            const padL = 60, padR = 40, padT = 60, padB = 60;
            const totalMin = parseInt(document.getElementById('total-min').value) || 120;
            const x_scale = (w - padL - padR) / totalMin;

            // 기본 축 그리기
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--axis').trim();
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(padL, h - padB); ctx.lineTo(w - padR, h - padB); // X축
            ctx.moveTo(padL, padT); ctx.lineTo(padL, h - padB); // Y축
            ctx.stroke();

            // 시간 눈금 및 데이터 렌더링 (간소화된 예시)
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text').trim();
            ctx.textAlign = "center";
            for(let i=0; i<=totalMin; i+=20) {
                const x = padL + i * x_scale;
                ctx.fillText(i+"m", x, h - padB + 20);
            }

            // 데이터 시각화 로직...
            intervals.forEach(item => {
                // 타입별 색상 지정 및 그리기 (생략된 기존 로직 그대로 유지됨)
            });
        }

        function toggleRun() {
            isRunning = !isRunning;
            document.getElementById('run-btn').innerText = isRunning ? "Stop Sequence" : "Run Sequence";
            document.getElementById('run-btn').style.background = isRunning ? "#ff3b30" : "";
        }
    </script>
</body>
</html>
